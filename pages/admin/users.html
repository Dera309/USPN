<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Manage Users | USPN Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
.ambient-shadow{box-shadow:0px 12px 32px rgba(25,28,29,0.04)}
@media(min-width:768px){body{min-height:max(884px,100dvh)}}
</style>
</head>
<body class="bg-surface text-on-surface antialiased">
<a href="#admin-main" class="skip-link">Skip to main content</a>

<header class="fixed top-0 w-full z-50 bg-slate-50/70 backdrop-blur-xl shadow-xl shadow-slate-900/5 h-20">
  <div class="flex justify-between items-center max-w-full px-6 h-full">
    <div class="flex items-center gap-3">
      <span class="material-symbols-outlined text-orange-600 text-2xl">local_shipping</span>
      <span class="text-xl font-black uppercase tracking-widest text-slate-950 font-headline">USPN</span>
      <span class="hidden md:block text-xs font-bold uppercase tracking-widest text-slate-400 ml-2">Admin</span>
    </div>
    <button onclick="logout()" class="bg-secondary text-white px-4 py-2 rounded-lg font-bold text-sm">Logout</button>
  </div>
</header>

<div class="flex min-h-screen pt-20">
  <aside class="hidden lg:flex flex-col w-64 fixed left-0 top-20 bottom-0 bg-slate-950 border-r border-slate-800/50 py-8 z-40">
    <nav class="flex-1 space-y-1">
      <a href="dashboard.html" class="flex items-center gap-4 text-slate-500 hover:text-slate-300 px-6 py-4 hover:bg-slate-900 transition-all"><span class="material-symbols-outlined">dashboard</span><span class="text-sm font-semibold font-headline">Dashboard</span></a>
      <a href="shipments.html" class="flex items-center gap-4 text-slate-500 hover:text-slate-300 px-6 py-4 hover:bg-slate-900 transition-all"><span class="material-symbols-outlined">inventory_2</span><span class="text-sm font-semibold font-headline">Shipments</span></a>
      <a href="users.html" class="flex items-center gap-4 bg-orange-600/10 text-orange-500 border-r-4 border-orange-600 px-6 py-4"><span class="material-symbols-outlined">group</span><span class="text-sm font-semibold font-headline">Users</span></a>
      <a href="../../index.html" class="flex items-center gap-4 text-slate-500 hover:text-slate-300 px-6 py-4 hover:bg-slate-900 transition-all"><span class="material-symbols-outlined">public</span><span class="text-sm font-semibold font-headline">View Site</span></a>
    </nav>
  </aside>

  <main id="admin-main" class="hidden flex-1 lg:ml-64 px-4 py-8 md:px-8 pb-24 lg:pb-8">
    <div class="max-w-5xl mx-auto">
      <header class="mb-8">
        <span class="text-secondary font-bold text-xs uppercase tracking-[0.2em] mb-2 block">User Management</span>
        <h1 class="text-4xl font-extrabold text-primary tracking-tight font-headline">All Users</h1>
      </header>

      <div id="toast" class="hidden fixed top-24 right-6 z-50 bg-slate-900 text-white px-6 py-4 rounded-xl font-medium shadow-2xl text-sm"></div>

      <div class="space-y-3" id="users-list"></div>
    </div>
  </main>
</div>

<!-- Edit User Modal -->
<div id="edit-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeModal()"></div>
  <div class="relative bg-surface-container-lowest rounded-2xl p-8 w-full max-w-md ambient-shadow z-10">
    <h3 class="font-headline font-bold text-primary text-xl mb-6">Edit User</h3>
    <form id="edit-user-form" class="space-y-5">
      <input type="hidden" id="modal-user-id"/>
      <div class="space-y-2">
        <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant font-label">Full Name</label>
        <input id="modal-name" type="text" class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3 focus:ring-2 focus:ring-secondary/20 transition-all"/>
      </div>
      <div class="space-y-2">
        <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant font-label">Email</label>
        <input id="modal-email" type="email" class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3 focus:ring-2 focus:ring-secondary/20 transition-all"/>
      </div>
      <div class="space-y-2">
        <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant font-label">Role</label>
        <select id="modal-role" class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3 focus:ring-2 focus:ring-secondary/20 transition-all text-on-surface">
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="flex gap-4 pt-2">
        <button type="submit" class="flex-1 bg-secondary text-white font-bold py-3 rounded-lg hover:bg-secondary-container hover:text-on-secondary-container transition-all">Save Changes</button>
        <button type="button" onclick="closeModal()" class="flex-1 border border-outline-variant text-on-surface font-bold py-3 rounded-lg hover:bg-surface-container-low transition-all">Cancel</button>
      </div>
    </form>
  </div>
</div>



<nav class="lg:hidden fixed bottom-0 w-full bg-slate-950 text-slate-300 flex justify-around items-center h-20 z-50 border-t border-slate-800/50 safe-bottom-nav">
  <a href="dashboard.html" class="flex flex-col items-center gap-1 text-slate-500"><span class="material-symbols-outlined">dashboard</span><span class="text-[10px] font-bold uppercase">Dashboard</span></a>
  <a href="shipments.html" class="flex flex-col items-center gap-1 text-slate-500"><span class="material-symbols-outlined">inventory_2</span><span class="text-[10px] font-bold uppercase">Shipments</span></a>
  <a href="users.html" class="flex flex-col items-center gap-1 text-orange-500"><span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">group</span><span class="text-[10px] font-bold uppercase">Users</span></a>
</nav>

<script type="module" src="/src/main.js"></script>
<script type="module" src="/src/pages/admin/users.js"></script>
</body>
</html>
